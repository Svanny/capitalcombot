appId: com.svanny.capitalcombot
productName: "Capital.com Trading Assistant"
copyright: "Copyright © 2026 Svanny"

directories:
  output: release
  buildResources: build-resources

nodeGypRebuild: false

files:
  - out/**/*
  - package.json
  - gold_die_logo.png

asarUnpack:
  - node_modules/keytar/**/*

artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

mac:
  target:
    - dmg
  category: public.app-category.finance
  icon: build-resources/icon.png

win:
  target:
    - nsis
  icon: build-resources/icon.png

linux:
  target:
    - AppImage
    - deb
  category: Office
  icon: build-resources/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
